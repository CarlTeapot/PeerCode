name: PeerCode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------
  #               frontend checks
  # -------------------------------------------
  frontend:
    name: Frontend (Lint & Format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tauri-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,css}" 
        
      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Check TypeScript types
        run: npx tsc --noEmit

  # -------------------------------------------
  #                 rust checks
  # -------------------------------------------
  rust:
    name: Rust (Format, Lint, Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # dependencies needed by tauri
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format (CRDT Core)
        run: cargo fmt --all -- --check
        working-directory: ./crdt-core

      - name: Clippy (CRDT Core)
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./crdt-core

      - name: Test (CRDT Core)
        run: cargo test
        working-directory: ./crdt-core

      - name: Format (Tauri)
        run: cargo fmt --all -- --check
        working-directory: ./tauri-app/src-tauri

      - name: Clippy (Tauri)
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./tauri-app/src-tauri

      - name: Test (Tauri)
        run: cargo test
        working-directory: ./tauri-app/src-tauri

  # -------------------------------------------
  #                 go checks
  # -------------------------------------------
  go:
    name: Go (Format, Lint, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'

      - name: Check Formatting
        run: go fmt ./...

      - name: Run Go Vet (Linter)
        run: go vet ./...

      - name: Run Tests
        run: go test -v ./...